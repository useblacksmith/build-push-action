# https://yarnpkg.com/configuration/yarnrc

compressionLevel: mixed
enableGlobalCache: false

logFilters:
  - code: YN0013
    level: discard
  - code: YN0019
    level: discard
  - code: YN0076
    level: discard
  - code: YN0086
    level: discard

nodeLinker: node-modules

npmScopes:
  buf:
    npmRegistryServer: "https://buf.build/gen/npm/v1/"
